services:
  # --- 1. OLTP DATABASE (MySQL) ---
  mysql:
    image: mysql:8.0
    container_name: crm_mysql
    environment:
      MYSQL_ROOT_PASSWORD: mypass
      MYSQL_DATABASE: banking_crm
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # --- 2. HDFS ARCHITECTURE (Hadoop) ---
  namenode:
    image: apache/hadoop:3.3.6
    container_name: crm_namenode
    hostname: namenode
    user: root
    command: >
      bash -c "
        mkdir -p /opt/hadoop/data/nameNode &&
        chown -R hadoop:hadoop /opt/hadoop/data/nameNode &&
        chmod 755 /opt/hadoop/data/nameNode &&
        su -c '
          if [ ! -f /opt/hadoop/data/nameNode/current/VERSION ]; then
            hdfs namenode -format -force
          fi
          hdfs namenode
        ' hadoop
      "
    environment:
      HADOOP_HOME: /opt/hadoop
      CLUSTER_NAME: banking_cluster
    env_file:
      - ./hadoop.env
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - namenode_data:/opt/hadoop/data/nameNode
      - ./data:/data_landing_zone

  datanode:
    image: apache/hadoop:3.3.6
    container_name: crm_datanode
    user: root
    command: >
      bash -c "
        mkdir -p /opt/hadoop/data/dataNode &&
        chown -R hadoop:hadoop /opt/hadoop/data/dataNode &&
        chmod 755 /opt/hadoop/data/dataNode &&
        su -c 'hdfs datanode' hadoop
      "
    env_file:
      - ./hadoop.env
    ports:
      - "9864:9864"
    volumes:
      - datanode_data:/opt/hadoop/data/dataNode
    depends_on:
      - namenode

  # --- 3. DATA PROCESSING (Apache Spark) ---
  spark-master:
    image: apache/spark:3.5.1
    container_name: crm_spark_master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    environment:
      SPARK_MODE: master
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./scripts:/opt/spark/scripts

  spark-worker:
    image: apache/spark:3.5.1
    container_name: crm_spark_worker
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    depends_on:
      - spark-master

  # --- 4. WORKFLOW ORCHESTRATION (Apache Airflow) ---
  airflow:
    image: apache/airflow:2.8.1
    container_name: crm_airflow
    command: standalone
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=mypass
    ports:
      - "8081:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts

volumes:
  mysql_data:
  namenode_data:
  datanode_data:
